<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trellis Standup</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%232563eb'/%3E%3Ctext x='50' y='68' font-family='sans-serif' font-weight='700' font-size='54' fill='white' text-anchor='middle'%3ET%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="site-header">
    <div class="container header-inner">
      <span class="logo">Trellis<span>Standup</span></span>
      <a href="team.html" class="link-secondary">Team page →</a>
    </div>
  </header>

  <main class="container">
    <h1>Post today's update</h1>
    <p class="lead">Three short lines. Takes a minute.</p>

    <form id="updateForm" class="form-card" novalidate>
      <div class="field">
        <label for="name">Your name</label>
        <select id="name" name="name" required>
          <option value="" disabled selected>Choose your name</option>
        </select>
      </div>

      <div class="field field-did">
        <label for="did"><span class="dot"></span>Did — what I did</label>
        <textarea id="did" name="did" rows="3" required placeholder="What did you get done today?"></textarea>
      </div>

      <div class="field field-next">
        <label for="next"><span class="dot"></span>Next — what I'm doing next</label>
        <textarea id="next" name="next" rows="3" required placeholder="What's next?"></textarea>
      </div>

      <div class="field field-stuck">
        <label for="stuck"><span class="dot"></span>Stuck — where I'm stuck</label>
        <textarea id="stuck" name="stuck" rows="3" placeholder="Anything blocking you? (optional — write 'nothing' if not)"></textarea>
      </div>

      <button type="submit" class="btn btn-primary">Submit update</button>
    </form>

    <section id="result" class="result hidden" aria-live="polite">
      <h2>Your update</h2>
      <div class="card">
        <p class="card-name" id="resultName"></p>
        <p class="card-label did">Did</p>
        <p class="card-text" id="resultDid"></p>
        <p class="card-label next">Next</p>
        <p class="card-text" id="resultNext"></p>
        <p class="card-label stuck">Stuck</p>
        <p class="card-text" id="resultStuck"></p>
      </div>
      <p class="note">This is a preview only — nothing is saved yet.</p>
    </section>
  </main>

  <script src="names.js"></script>
  <script src="script.js"></script>
</body>
</html>
